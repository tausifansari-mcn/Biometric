services:
  - type: web
    name: biometric-backend
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: SQL_SERVER
        value: "172.10.10.146"
      - key: SQL_PORT
        value: "1433"
      - key: SQL_DATABASE
        value: "NCOSEC"
      - key: SQL_USER
        value: "shivamg"
      - key: SQL_PASSWORD
        sync: false
      - key: SQL_CONNECTION_MODE
        value: "pymssql"
      - key: SQL_TDS_VERSION
        value: "7.0"
      - key: SQL_DRIVER
        value: "{ODBC Driver 17 for SQL Server}"
      - key: MYSQL_HOST
        value: "122.184.128.90"
      - key: MYSQL_PORT
        value: "3306"
      - key: MYSQL_DATABASE
        value: "Shivamgiri"
      - key: MYSQL_USER
        value: "root"
      - key: MYSQL_PASSWORD
        sync: false
      - key: CORS_ORIGINS
        value: "https://biometric-78e6.vercel.app,http://localhost:3000,http://127.0.0.1:3000"
