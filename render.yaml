services:
  - type: web
    name: biometric-backend
    runtime: docker
    plan: free
    envVars:
      - key: PORT
        value: 8000
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: SQL_SERVER
        sync: false
      - key: SQL_PORT
        value: 1433
      - key: SQL_DATABASE
        sync: false
      - key: SQL_USER
        sync: false
      - key: SQL_PASSWORD
        sync: false
      - key: SQL_DRIVER
        value: "{ODBC Driver 17 for SQL Server}"
      - key: MYSQL_HOST
        sync: false
      - key: MYSQL_PORT
        value: 3306
      - key: MYSQL_DATABASE
        sync: false
      - key: MYSQL_USER
        sync: false
      - key: MYSQL_PASSWORD
        sync: false
      - key: CORS_ORIGINS
        sync: false
